name: Deploy RealTime Service

on:
  push:
    branches: [ main ]
    paths:
      - 'RealTime_Service/**' # Triggers only if the RealTime_Service folder changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push RealTime Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-realtime:latest ./RealTime_Service
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-realtime:latest

      - name: Deploy to AWS K3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Restarting Real-Time & Chat services..."
            kubectl rollout restart deployment/realtime-service
            kubectl rollout restart deployment/realtime-worker
            
            echo "Waiting for Real-Time Service to start..."
            kubectl rollout status deployment/realtime-service
            
            echo "Running Real-Time Service Migrations..."
            kubectl exec deploy/realtime-service -- python manage.py migrate
            
            echo "RealTime Deployment and Migrations completed successfully!"
            kubectl get pods | grep realtime