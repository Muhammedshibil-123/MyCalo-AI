name: Deploy AI Service

on:
  push:
    branches: [ main ]
    paths:
      - 'AI_Services/**' # Triggers only if the AI_Services folder changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push AI Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-ai:latest ./AI_Services
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-ai:latest

      - name: Deploy to AWS K3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Restarting AI service..."
            kubectl rollout restart deployment/ai-service
            
            echo "Waiting for AI Service to start..."
            kubectl rollout status deployment/ai-service
            
            echo "AI Deployment completed successfully!"
            kubectl get pods | grep ai-service