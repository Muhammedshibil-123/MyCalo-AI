name: MyCalo AI Production Deployment

on:
  push:
    branches: [ main ] # Triggers only when you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. Build and Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-backend:latest ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-backend:latest

      # 3. Build and Push AI Service
      - name: Build and Push AI Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-ai:latest ./AI_Service
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-ai:latest

      # 4. SSH into EC2 and Restart K3s Pods
      - name: Deploy to AWS K3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest images and restart deployments
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/ai-service
            kubectl rollout restart deployment/backend-worker
            kubectl rollout restart deployment/backend-beat
            
            # Verify status
            kubectl get pods