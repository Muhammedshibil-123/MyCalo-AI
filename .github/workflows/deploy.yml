name: MyCalo AI Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build and Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-backend:latest ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-backend:latest

      # 2. Build and Push AI Service
      - name: Build and Push AI Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-ai:latest ./ai-services
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-ai:latest

      # 3. Build and Push Realtime Service
      - name: Build and Push Realtime Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mycalo-realtime:latest ./RealTime_Service
          docker push ${{ secrets.DOCKER_USERNAME }}/mycalo-realtime:latest

      # 4. SSH into EC2 and Restart All Deployments
      - name: Deploy to AWS K3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Restart core services
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/backend-worker
            kubectl rollout restart deployment/backend-beat
            
            # Restart AI service
            kubectl rollout restart deployment/ai-service
            
            # Restart Realtime services
            kubectl rollout restart deployment/realtime-service
            kubectl rollout restart deployment/realtime-worker
            
            kubectl get pods